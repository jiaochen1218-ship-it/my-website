<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGOS // 思想卡牌·完全体 v4.0</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-front-bg: #141414;
            --card-back-bg: #0d0d0d;
            --text-main: #E5E5E5;
            --text-muted: #666666;
            --accent-red: #ff0033;
            --accent-green: #26df73;
            --cyber-cyan: #00bfff;
            
            --glow-N: #222222;
            --glow-R: #00bfff;
            --glow-SR: #9933ff;
            --glow-SSR: #ff0033;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, monospace;
            padding: 15px; display: flex; flex-direction: column; min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; width: 100%; display: none; flex-direction: column; flex-grow: 1; }
        .active { display: flex; }
        
        h2 { font-weight: 300; letter-spacing: 3px; margin-bottom: 20px; text-align: center; color: #fff; font-size: 18px;}
        input, button, textarea, select {
            background: #141414; border: 1px solid #262626; color: #fff; padding: 12px; 
            font-family: monospace; outline: none; margin-bottom: 12px; font-size: 13px; width: 100%; border-radius: 4px;
        }
        button { cursor: pointer; transition: all 0.2s; font-weight: bold; border: 1px solid #444; }
        button:hover { background: #222; border-color: #666; }
        
        .player-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .p-card { background: #111; border-left: 3px solid #333; padding: 8px; font-size: 11px; border-radius: 2px; }
        .p-card.active-speaker { border-left-color: var(--accent-red); background: #1a1212; }
        .p-card.dead { opacity: 0.3; border-left-color: #555; text-decoration: line-through; }

        /* 🃏 3D 竖版实体卡牌 (经典 Tarot 比例) */
        .card-scene {
            perspective: 1500px;
            width: 250px;
            height: 375px;
            margin: 15px auto;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #222;
        }
        
        /* 卡牌背面（性质面） */
        .card-face-back {
            background: linear-gradient(145deg, #121212, #080808);
            color: var(--text-main); justify-content: flex-start; text-align: left;
            transform: rotateY(0deg);
        }
        /* 卡牌正面（问题面） */
        .card-face-front {
            background: linear-gradient(145deg, #1c1c1c, #111111);
            transform: rotateY(180deg); justify-content: space-between; text-align: left;
        }

        .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 15px; display: flex; justify-content: space-between;}
        .meta-section { margin-top: 15px; border-top: 1px dashed #262626; padding-top: 15px; }
        .meta-label { font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 4px; letter-spacing: 1px;}
        .meta-value { font-size: 12px; color: #bbb; line-height: 1.5; margin-bottom: 12px;}
        .question-body { font-size: 13px; line-height: 1.6; color: #ffffff; margin-top: auto; margin-bottom: auto; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-group button { margin-bottom: 0; flex: 1; font-size: 11px; padding: 10px 5px; }
        
        .vote-box { border: 1px dashed var(--accent-red); padding: 15px; margin-top: 10px; background: #090909; border-radius: 6px; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;}
        .cb-label { display: flex; align-items: center; gap: 10px; background: #141414; padding: 10px; margin-bottom: 6px; font-size: 12px; border: 1px solid #222; cursor: pointer;}
        .cb-label input { width: auto; margin-bottom: 0; }
        #log-panel { font-size: 11px; color: #444; max-height: 70px; overflow-y: auto; margin-top: auto; border-top: 1px solid #1a1a1a; padding-top: 8px;}
    </style>
</head>
<body>

    <div class="container active" id="view-setup">
        <h2>LOGOS // 意识博弈剧场</h2>
        <label style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:6px;">设定思想灵体数量 (2-6人):</label>
        <select id="player-count" onchange="adjustNameInputs()">
            <option value="2">2 人局 (深渊对决)</option>
            <option value="3">3 人局</option>
            <option value="4" selected>4 人局 (标准推演)</option>
            <option value="5">5 人局</option>
            <option value="6">6 人局</option>
        </select>
        <div id="name-fields"></div>
        <button onclick="startGame()" style="border-color:var(--cyber-cyan); color:var(--cyber-cyan)">激活思辨物理矩阵</button>
    </div>

    <div class="container" id="view-stage">
        <div class="player-list" id="scoreboard"></div>

        <div class="card-scene" id="card-scene-area" style="display:none;">
            <div class="card-inner" id="card-inner-object" onclick="toggleFlip()">
                <div class="card-face card-face-back">
                    <div class="card-title">
                        <span id="card-back-rarity">DIMENSION // N</span>
                        <span>BACK // 性质面</span>
                    </div>
                    <div class="meta-section">
                        <span class="meta-label">⚖️ 命题性质 (NATURE)</span>
                        <div class="meta-value" id="card-nature-text">--</div>
                        <span class="meta-label">👁️ 精神功能 (FUNCTION)</span>
                        <div class="meta-value" id="card-function-text">--</div>
                    </div>
                    <div style="margin-top: auto; text-align: center; font-size: 10px; color: #444;" id="card-tip">
                        [ 点击卡牌 · 翻开反面 ]
                    </div>
                </div>
                <div class="card-face card-face-front">
                    <div class="card-title">
                        <span id="card-front-speaker" style="color: var(--accent-red);">SUBJECT // </span>
                        <span>FRONT // 问题面</span>
                    </div>
                    <div class="question-body" id="card-question-text">--</div>
                    <div style="font-size: 9px; color: #333; text-align: right;">LOGOS v4.0 MUTEX_CORE</div>
                </div>
            </div>
        </div>

        <div id="control-panel"></div>
        <div id="log-panel"></div>
    </div>

    <script>
        // 🔮 100张全新固态全量命题数据库
        const RAW_TEXTS = [
            // N 维度 (1-40题)：偏向日常、经验与日常性反思
            { txt: "描述你今天最平静的瞬间。它是源于外界的消极空白，还是内在的秩序重组？", nat: "日常现象学 · 宁静视界" },
            { txt: "在你的天性中，你最不满意的是哪一点？你曾试过与它彻底决裂还是别扭地共存？", nat: "自我指涉 · 局限反思" },
            { txt: "你最痛恨别人身上的哪种特质？它是否构成了你自身被压抑阴影的秘密投影？", nat: "心理投射 · 阴影测试" },
            { txt: "如果现在能抹去你过去的一段特定记忆，你愿意牺牲这段记忆带来的所有成长吗？", nat: "时间线切除 · 沉没成本" },
            { txt: "你目前最恐惧失去的是什么？为什么它卡住了你全部的安全感防御机制？", nat: "经验剖析 · 恐惧镜像" },
            { txt: "你最近一次在亲密关系中撒谎或保留真相是因为什么？", nat: "隐私黑箱 · 情感伪饰" },
            { txt: "你认为当下的日常生活里，有多少成分属于为了迎合外部世界的纯粹“表演”？", nat: "拟剧理论 · 主体伪装" },
            { txt: "用三个词形容你现在的精神状态，并指出其中哪个词正在悄悄失效。", nat: "当下实存 · 语词解构" },
            { txt: "你是否有过因嫉妒而希望某个亲近的人遭遇失败的瞬间？", nat: "人性暗面 · 嫉妒光谱" },
            { txt: "如果明天你将被剥夺所有电子设备一周，你最害怕面对的空虚是什么？", nat: "数字客体 · 媒介断链" },
            { txt: "你上一次感受到“被完全理解”是什么时候？那是一种错觉还是事实？", nat: "主体间性 · 共情神话" },
            { txt: "在公共场所遭遇不公时，你通常选择隐忍还是对抗？其核心驱动力是恐惧还是冷漠？", nat: "社会心理 · 行动阈值" },
            { txt: "如果你现在的伴侣/挚友彻底变成另一种外貌，你的爱会随之贬值吗？", nat: "本质主义 · 身体景观" },
            { txt: "你曾为满足父母或社会的期待做出过最违背天性的妥协是什么？", nat: "他者规训 · 假我塑造" },
            { txt: "当深夜独自一人时，你是渴望与外部世界连接，还是享受与世界断联的绝对安全？", nat: "空间异化 · 独处质感" },
            { txt: "你觉得自己的心智年龄现在停留在多少岁？为什么那个岁数的影子挥之不去？", nat: "心理时间 · 创伤锚定" },
            { txt: "对于金钱，你内心的真实态度是将其视为通往自由的工具，还是填补不安全感的安全锁？", nat: "资本异化 · 欲望边界" },
            { txt: "回忆你童年时期最深刻的一个孤独瞬间，那个小女孩/男孩如今被你安放在哪了？", nat: "童年镜像 · 原生追溯" },
            { txt: "如果你发现自己身上所有引以为傲的特质在天才面前不值一提，你会陷入虚无吗？", nat: "自恋祛魅 · 均值回归" },
            { txt: "你是否在一个不喜欢的环境中待了很久却不敢离开？阻碍你的是舒适圈还是对未知的恐惧？", nat: "存在惰性 · 动态真空" },
            { txt: "如果能准确预知自己还能活多少年，你会活得比现在更疯狂还是更保守？", nat: "死亡叙事 · 时间焦虑" },
            { txt: "你是否有过在网络上匿名宣泄恶意或刻薄言论的经历？当时获得了什么快感？", nat: "赛博暗面 · 匿名面具" },

            { txt: "你最害怕被贴上什么标签？这个标签伤害到的是你的社会面具还是内在真我？", nat: "语言规训 · 污名恐惧" },
            { txt: "如果给你一个机会回到过去挽回一个彻底搞砸的人际关系，你现在还会去吗？", nat: "时空回溯 · 遗憾清算" },
            { txt: "你觉得自己更渴望获得世俗意义上的“成功”，还是精神层面的“自洽”？", nat: "价值位阶 · 路线抉择" },

            { txt: "在目前的日常生活中，什么事情能让你感受到最纯粹、不带任何功利目的的快乐？", nat: "审美实存 · 纯粹愉悦" },
            { txt: "你认为爱情的本质是两个孤独灵魂的相互救赎，还是两套自恋系统的深度合作？", nat: "情感本体 · 爱情解构" },

            { txt: "描述一个你最无法原谅自己的过错。现在的你和那个犯错的自己达成和解了吗？", nat: "自我审判 · 罪感折射" },
            { txt: "你是否曾经为了融入一个群体而刻意隐藏自己的聪明、品味或真实观点？", nat: "群体同质 · 拟态生存" },
            { txt: "在独处时，你敢于直视镜子里不加任何修饰与表情控制的自己的眼睛吗？", nat: "镜像阶段 · 真实凝视" },
            { txt: "你是否常常感到自己做的事情毫无意义？这种无意义感通常在什么时候吞噬你？", nat: "虚无侵蚀 · 意义匮乏" },

            { txt: "你认为自己在别人眼中最明显的缺点是什么？你是否在刻意夸大它来掩盖更深的缺陷？", nat: "社交策略 · 缺陷伪装" },
            { txt: "你对衰老的真实态度是什么？当你发现第一根白发或第一条皱纹时，内心发生了什么？", nat: "身体衰变 · 时间恐慌" },

            // R 维度 (41-70题)：涉及精神构造、理想主体与深度精神状态
            { txt: "如果可以任选世界上任何人（无论生死），你想邀请谁共进晚餐，你们的核心分歧将是什么？", nat: "精神重构 · 理想主体" },
            { txt: "对你来说，一个完全完美、没有任何异化和妥协的一天必须包含哪些元素？", nat: "存在状态 · 终极静谧" },
            { txt: "你在什么时候感受过最深切的、与世界彻底隔离的孤独？它是如何重塑你内心的？", nat: "存在主义 · 荒原涉足" },
            { txt: "如果艺术的价值和科学的真理发生冲突，你更愿意活在一个美丽的谎言里还是冰冷的真相中？", nat: "价值对立 · 审美与真理" },

            { txt: "你认为个体的独特性是与生俱来的本质，还是被语言、社会和历史关系缝合出的偶然产物？", nat: "主体建构 · 独特性神话" },

            { txt: "你是否有一个从未向任何人透露过的宏大理想或荒诞幻想？是什么让你羞于启齿？", nat: "隐秘宏叙 · 幻想边界" },
            { txt: "如果你能知道全桌所有人对你的真实第一印象，你敢选择公开听取吗？", nat: "镜中自我 · 他者审判" },

            { txt: "如果神明存在但冷漠无情，人类全部的尊严应该建立在对神明的顺从还是高傲的对抗之上？", nat: "西西弗神话 · 尊严边界" },

            { txt: "如果通过彻底抹除你存在过的所有痕迹（包括父母朋友对你的全部记忆），可以换取世界线逆转，拯救一个因你而死的无辜生命，你抹除自己吗？", nat: "存在消亡 · 终极替代" }
        ];

        // 🔄 动态运行时卡池
        let runtimePool = { N: [], R: [], SR: [], SSR: [] };
        let players = [];
        let currentIndex = 0;
        let currentCard = null;
        let recognition = null;
        let isRecording = false;
        let hasTransferredThisTurn = false; 

        function adjustNameInputs() {
            const count = parseInt(document.getElementById('player-count').value);
            const container = document.getElementById('name-fields');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" class="player-name-input" placeholder="思想灵体 ${i}" value="思考者${i}">`;
            }
        }
        window.onload = adjustNameInputs;

        // 🎰 核心：初始化全量100题卡池并分配独立互斥属性
        function initGlobalDatabase() {
            // 重置影子卡池
            runtimePool = { N: [], R: [], SR: [], SSR: [] };
            
            RAW_TEXTS.forEach((item, index) => {
                let r = 'N';
                if (index >= 90) r = 'SSR';
                else if (index >= 70) r = 'SR';
                else if (index >= 40) r = 'R';

                // 核心规则：利用概率算法为卡牌赋予单一互斥属性，绝不重叠
                let feat = null;
                const rand = Math.random();
                if (r === 'SSR' || r === 'SR') {
                    // 高阶卡牌：40%普通牌，25%沉默牌(针对极端隐私/伦理)，20%转嫁牌，15%共鸣牌
                    if (rand < 0.25) feat = 'SILENT';
                    else if (rand < 0.45) feat = 'TRANSFER';
                    else if (rand < 0.60) feat = 'RESONANCE';
                } else {
                    // 低阶卡牌：50%普通牌，15%沉默牌，20%转嫁牌，15%共鸣牌
                    if (rand < 0.15) feat = 'SILENT';
                    else if (rand < 0.35) feat = 'TRANSFER';
                    else if (rand < 0.50) feat = 'RESONANCE';
                }

                // 翻译成文本展示给玩家
                let funcDesc = "通识理性命题。无法转嫁、无法沉默、无法全场共鸣，请独自面对审判。";
                if (feat === 'SILENT') funcDesc = "🤫 缄默协议：因此命题触及核心隐私或伦理黑洞，本牌激活【沉默模式】。允许玩家放弃作答以保全心智，但无法获得LP点数。";
                if (feat === 'TRANSFER') funcDesc = "⚡ 因果转嫁：精神力场发生偏折，持牌者可在翻牌前面向深渊，将此未知命题强制转嫁给特定他者。";
                if (feat === 'RESONANCE') funcDesc = "🔥 灵魂共鸣：一具肉身无法独自容纳此命题。开启全员共鸣，所有人必须共同对视此真理。";

                runtimePool[r].push({
                    text: item.txt,
                    nature: item.nat,
                    feature: feat,
                    function: funcDesc,
                    rarity: r
                });
            });
        }

        function startGame() {
            const inputs = document.querySelectorAll('.player-name-input');
            players = Array.from(inputs).map(input => ({
                name: input.value.trim() || "未命名", lp: 5, sanity: 100, isNihilist: false
            }));
            
            initGlobalDatabase();
            
            document.getElementById('view-setup').classList.remove('active');
            document.getElementById('view-stage').classList.add('active');
            initSpeech();
            updateUI();
            renderTurnStart();
        }

        function updateUI() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            players.forEach((p, idx) => {
                let cls = "p-card";
                if(idx === currentIndex) cls += " active-speaker";
                if(p.isNihilist) cls += " dead";
                sb.innerHTML += `
                    <div class="${cls}">
                        <b>${p.name}</b> ${p.isNihilist ? '[已坠入虚无]' : '[理智重塑]'}<br>
                        LP: <b>${p.lp}</b> | SAN: <b>${p.sanity}%</b>
                    </div>`;
            });
        }

        function renderTurnStart() {
            document.getElementById('card-scene-area').style.display = 'none';
            document.getElementById('card-inner-object').classList.remove('is-flipped');
            hasTransferredThisTurn = false;

            const panel = document.getElementById('control-panel');
            panel.innerHTML = `<button onclick="drawCardFromEngine()">🔮 [${players[currentIndex].name}] 从维度深处抽牌</button>`;
        }

        function drawCardFromEngine() {
            const rarities = ['N', 'R', 'SR', 'SSR'];
            const rand = Math.random() * 100;
            let r = 'N';
            if(rand < 12) r = 'SSR'; else if(rand < 30) r = 'SR'; else if(rand < 60) r = 'R';

            // 保护机制：如果当前层被抽干，重新初始化大卡池
            if (runtimePool[r].length === 0) {
                initGlobalDatabase();
                pushLog("维度归还", `卡池发生大面积坍缩，100思想卡牌已重新洗牌注入...`);
            }

            const randomIndex = Math.floor(Math.random() * runtimePool[r].length);
            currentCard = runtimePool[r].splice(randomIndex, 1)[0];

            const cardObj = document.getElementById('card-inner-object');
            cardObj.style.boxShadow = `0 0 25px var(--glow-${currentCard.rarity})`;
            document.getElementById('card-scene-area').style.display = 'block';
            
            syncCardDOM();
            renderStrategyOptions();
        }

        function syncCardDOM() {
            document.getElementById('card-back-rarity').innerText = `DIMENSION // ${currentCard.rarity} | CORE`;
            document.getElementById('card-nature-text').innerText = currentCard.nature;
            document.getElementById('card-function-text').innerText = currentCard.function;
            
            const speakerName = (currentCard.feature === 'RESONANCE' && document.getElementById('card-inner-object').classList.contains('is-flipped')) ? "🔥 全场共鸣时刻" : players[currentIndex].name;
            document.getElementById('card-front-speaker').innerText = `SUBJECT // ${speakerName}`;
            document.getElementById('card-question-text').innerText = currentCard.text;
        }

        function toggleFlip() {
            // 如果存在未被转嫁处理的非共鸣或普通情况，允许自由翻牌查看
            document.getElementById('card-inner-object').classList.toggle('is-flipped');
            syncCardDOM();
        }

        // 🎭 桌游级操控台：根据卡牌唯一的 feature 属性挂载专属动作按钮
        function renderStrategyOptions() {
            const panel = document.getElementById('control-panel');
            const alivePlayers = players.filter(p => !p.isNihilist);
            
            let actionAreaHTML = '';

            // 规则处理：转嫁牌、共鸣牌、沉默牌互相排他，绝不同时在一张卡上
            if (currentCard.feature === 'TRANSFER') {
                // 1. 转嫁分支
                if (alivePlayers.length > 2 && !hasTransferredThisTurn) {
                    let optionsHTML = '';
                    players.forEach((p, idx) => {
                        if(idx !== currentIndex && !p.isNihilist) optionsHTML += `<option value="${idx}">${p.name}</option>`;
                    });
                    actionAreaHTML = `
                        <div style="border: 1px solid #333; padding: 10px; border-radius:4px; margin-bottom:10px; background: #111;">
                            <span style="font-size:11px; color:var(--cyber-cyan)">⚡ 侦测到【转嫁功能】：允许指定他者替代作答</span>
                            <div class="btn-group" style="margin-top:5px;">
                                <select id="transfer-target" style="margin-bottom:0; padding:6px; flex:2;"></select>
                                <button onclick="executeCardTransfer()" style="flex:1; border-color:var(--cyber-cyan);">抛出卡牌</button>
                            </div>
                        </div>`;
                    setTimeout(() => { document.getElementById('transfer-target').innerHTML = optionsHTML; }, 10);
                } else if (alivePlayers.length === 2 && !hasTransferredThisTurn) {
                    const enemyIdx = players.findIndex((p, idx) => idx !== currentIndex && !p.isNihilist);
                    actionAreaHTML = `<button onclick="executeCardTransfer(${enemyIdx})" style="border-color:var(--accent-red); margin-bottom:10px;">⚡ 命运逆转：强行塞给对手作答</button>`;
                }
                
                // 转嫁卡不具备共鸣或沉默功能，提供唯一的标准解封选项
                actionAreaHTML += `<button onclick="acceptSingleTrial()" style="border-color:var(--text-main); background:#111;">👁 独自承受解封作答</button>`;

            } else if (currentCard.feature === 'RESONANCE') {
                // 2. 共鸣分支
                actionAreaHTML = `
                    <button onclick="triggerGlobalResonance()" style="border-color:var(--accent-green); background:#111; color: var(--accent-green);">🔥 触发全场共鸣协议 (全体起誓回答)</button>
                    <button onclick="acceptSingleTrial()" style="border-color:#444; font-size:10px; color:#666;">[放弃共鸣] 选择独自承受解封</button>
                `;
            } else if (currentCard.feature === 'SILENT') {
                // 3. 【全新引入】沉默分支：只有此类隐私或高难度命题允许启动沉默功能
                actionAreaHTML = `
                    <button onclick="executeSilenceProtocol()" style="border-color:var(--accent-red); background:#1a0c0e; color:#ff6666;">🤫 启动【缄默协议】(放弃本轮答题与得分)</button>
                    <button onclick="acceptSingleTrial()" style="border-color:var(--cyber-cyan);">📝 迎难而上：强行直面作答</button>
                `;
            } else {
                // 4. 普通卡牌没有任何功能
                actionAreaHTML = `<button onclick="acceptSingleTrial()" style="border-color:var(--cyber-cyan); background:#111;">👁 直面真实：独自承受解封</button>`;
            }

            panel.innerHTML = `
                ${actionAreaHTML}
                <p style="font-size:11px; color:#444; text-align:center; margin-top:8px;">[提示] 确认操作或点击卡牌后，将会自动显化正面真相</p>
            `;
        }

        // 机制：执行沉默功能（不回答不得分，损耗极低理智保全大局）
        function executeSilenceProtocol() {
            const speaker = players[currentIndex];
            speaker.sanity = Math.max(0, speaker.sanity - 5); // 保持沉默仅扣除5%的直面阵痛理智
            
            pushLog("精神防御", `${speaker.name} 对该隐私命题启动了【缄默协议】。其遁入深渊沉思，未获得任何LP点数。`);
            alert(`【缄默协议启动成功】\n\n${speaker.name} 选择了用沉默捍卫隐私。本轮不得分，理智微损 5%。`);
            
            if(speaker.sanity <= 0) speaker.isNihilist = true;
            checkGameOverAndRotate();
        }

        function executeCardTransfer(forcedTarget = null) {
            let targetIdx = forcedTarget;
            if (targetIdx === null) targetIdx = parseInt(document.getElementById('transfer-target').value);
            
            pushLog("因果流转", `${players[currentIndex].name} 视破卡牌因果，将其转嫁给 ${players[targetIdx].name}`);
            currentIndex = targetIdx;
            hasTransferredThisTurn = true; 
            
            updateUI();
            syncCardDOM();
            renderStrategyOptions();
        }

            pushLog("集群共振", `已触发【全场共鸣】！群体心智力场正在同步连线。`);

        function settleSinglePoints() {
            const sin = parseInt(document.getElementById('v-sincere').value) || 0;
            const hyp = parseInt(document.getElementById('v-hypocrite').value) || 0;

                speaker.lp += 3;

            } else {
                speaker.sanity = Math.max(0, speaker.sanity - 25);
                summary = `【判定伪善】 遭到逻辑与情感反噬，扣除 25% 理智。`;
                if(speaker.sanity <= 0) { speaker.isNihilist = true; summary += ` [坠入虚无主义]`; }
            }

            pushLog("裁决结算", `${speaker.name} 独自面对结果：${summary}`);
            alert(`【审判录入成功】\n\n${speaker.name}：${summary}`);
            checkGameOverAndRotate();
        }

        function enterResonanceVotingPhase() {
            const panel = document.getElementById('control-panel');
            panel.innerHTML = '';
            
            let checkboxesHTML = '';
            players.forEach((p, idx) => {
                if (!p.isNihilist) {
                    checkboxesHTML += `
                        <label class="cb-label">
                            <input type="checkbox" class="resonance-check" value="${idx}" checked>
                            <span>公投通过：<b>${p.name}</b> 的表现听起来足够真实</span>
                        </label>`;
                }
            });

            panel.innerHTML = `
                <div class="vote-box" style="border-color:var(--accent-green)">
                    <span style="font-size:11px; color:var(--accent-green)">[ ⚖️ 全场集体公意公投 ]</span>
                    <p style="font-size:10px; color:#666; margin:5px 0 12px 0;">全桌举手表决。凡是获得全场半数以上赞同票的人，请在下方保持勾选；被公认虚伪或敷衍回避的，请取消勾选：</p>
                    ${checkboxesHTML}
                    <button onclick="settleResonancePoints()" style="background:var(--accent-green); border:none; color:#000; margin-top:5px;">汇总集体意志，结算得分</button>
                </div>
            `;
        }

        function settleResonancePoints() {
            const checks = document.querySelectorAll('.resonance-check');
            let logMsg = "集群决策报告:\\n";

            checks.forEach(cb => {
                const idx = parseInt(cb.value);
                const p = players[idx];
                if (cb.checked) {
                    p.lp += 2; 
                    logMsg += `* [${p.name}] 真诚过关，获得 2 LP。\n`;
                } else {
                    p.sanity = Math.max(0, p.sanity - 20); 
                    logMsg += `* [${p.name}] 被公认不真诚，扣除 20% 理智。\n`;
                    if(p.sanity <= 0 && !p.isNihilist) {
                        p.isNihilist = true;
                        logMsg += `  └── ${p.name} 跌落理智奇点！\n`;
                    }
                }
            });

            pushLog("集群公决", "集体大审判法槌落下。");
            alert(`【全场共鸣审判成功录入】\n\n${logMsg}`);
            checkGameOverAndRotate();
        }

        function checkGameOverAndRotate() {
            let winner = players.find(p => p.lp >= 20 && !p.isNihilist);
            if(winner) {
                alert(`🎉【意识飞升触发】\n\n恭喜主体 ${winner.name} 率先突破 20 LP 界碑！解构了剧场的幻象，赢得胜利。`);
                location.reload();
                return;
            }

            if (players.filter(p => !p.isNihilist).length === 0) {
                alert(`💀【全员虚无灾难】\n\n全场所有主体的理智均已归零。世界线彻底坍缩，无人生还。`);
                location.reload();
                return;
            }

            do {
                currentIndex = (currentIndex + 1) % players.length;
            } while (players[currentIndex].isNihilist);

            updateUI();
            renderTurnStart();
        }

        function initSpeech() {
            const SpeechClass = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechClass) return;
            recognition = new SpeechClass(); recognition.lang = 'zh-CN';
            recognition.continuous = true; recognition.interimResults = true;
            recognition.onresult = (e) => {
                let res = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) res += e.results[i][0].transcript; }
                if(res) document.getElementById('reply-text').value += res;
            };
        }

        function toggleMic() {
            if(!recognition) return alert('当前运行环境未开放语音硬件接口。');
            if(!isRecording) {
                recognition.start(); isRecording = true;
                document.getElementById('mic-btn').innerText = "✕ 终止声学捕捉";
                document.getElementById('mic-btn').style.background = "var(--accent-red)";
            } else {
                recognition.stop(); isRecording = false;
                document.getElementById('mic-btn').innerText = "🎙 开启语音自白流听写";
                document.getElementById('mic-btn').style.background = "#141414";
            }
        }

        function pushLog(title, text) {
            const log = document.getElementById('log-panel');
            log.innerHTML = `[${title}] ${text}<br>` + log.innerHTML;
        }
    </script>
</body>
</html>
